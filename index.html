<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>OrçaJá</title>
<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* BACKGROUND */
body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #fff;
  height: 100vh;
}

/* GLASS EFFECT */
.glass {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
}

/* LOGIN */
.login {
  width: 350px;
  margin: 80px auto;
  padding: 30px;
  text-align: center;
}

.login h1 {
  margin-bottom: 20px;
}

.input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  outline: none;
}

.btn {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg, #7c3aed, #4f46e5);
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

/* LAYOUT */
.container {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  padding: 20px;
}

.sidebar h2 {
  margin-bottom: 20px;
}

.menu {
  list-style: none;
}

.menu li {
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
}

.menu li:hover {
  background: rgba(255,255,255,0.1);
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
}

/* CARDS */
.card {
  padding: 20px;
}

/* CHAT */
.chat {
  display: flex;
  flex-direction: column;
  height: 400px;
}

.messages {
  flex: 1;
  overflow-y: auto;
}

.msg {
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  max-width: 70%;
}

.me {
  background: #4f46e5;
  align-self: flex-end;
}

.other {
  background: rgba(255,255,255,0.1);
}

.input-chat {
  display: flex;
  margin-top: 10px;
}

.input-chat input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

/* PROPOSTAS */
.proposta {
  margin-bottom: 15px;
  padding: 15px;
  border-radius: 15px;
}

.proposta h4 {
  margin-bottom: 5px;
}

.price {
  color: #22c55e;
  font-weight: bold;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login glass">
  <h1>OrçaJá</h1>
  <input class="input" placeholder="Email">
  <input class="input" placeholder="Senha" type="password">
  <button class="btn">Entrar</button>
</div>

<!-- DASHBOARD -->
<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar glass">
    <h2>OrçaJá</h2>
    <ul class="menu">
      <li>Dashboard</li>
      <li>Solicitações</li>
      <li>Propostas</li>
      <li>Chat</li>
      <li>Perfil</li>
    </ul>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- CHAT -->
    <div class="card glass chat">
      <h3>Chat</h3>

      <div class="messages">
        <div class="msg other">Olá! Temos uma proposta pra você.</div>
        <div class="msg me">Pode me mandar mais detalhes?</div>
        <div class="msg other">Claro! Veja a imagem do projeto 👇</div>
      </div>

      <div class="input-chat">
        <input placeholder="Digite..." />
        <button class="btn">➤</button>
      </div>
    </div>

    <!-- PROPOSTAS -->
    <div class="card glass">
      <h3>Propostas</h3>

      <div class="proposta glass">
        <h4>Clínica Sorriso</h4>
        <p>Projeto completo odontológico</p>
        <p class="price">R$ 4.500</p>
      </div>

      <div class="proposta glass">
        <h4>Studio Odonto</h4>
        <p>Projeto moderno</p>
        <p class="price">R$ 4.200</p>
      </div>

    </div>

  </div>

</div>

</body>
</html>
